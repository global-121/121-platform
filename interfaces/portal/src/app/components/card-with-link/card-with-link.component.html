<div
  data-testid="card-with-link"
  class="group shadow-clickable-cards border-grey-300 relative h-full rounded-lg border bg-white transition-colors focus-within:border-purple-500 hover:border-purple-500"
>
  <div class="flex gap-4 p-4">
    @if (image()) {
      <img
        class="mx-auto size-14 object-contain"
        role="presentation"
        aria-hidden="true"
        [src]="image()"
        alt=""
      />
    }
    <div class="flex-1">
      <div class="text-lg font-bold">
        @if (!enableLink()) {
          <ng-container *ngTemplateOutlet="cardTitle"></ng-container>
        } @else {
          <a
            class="group-focus-within:text-purple group-hover:text-purple cursor-pointer transition-colors after:absolute after:inset-0 after:block"
            (keydown.space)="cardClicked.emit(); $event.preventDefault()"
            (keydown.enter)="cardClicked.emit()"
            [tabindex]="!href() ? 0 : null"
            (click)="cardClicked.emit()"
            [routerLink]="href()"
          >
            <ng-container *ngTemplateOutlet="cardTitle"></ng-container>
          </a>
        }
      </div>
      <ng-content select="[card-subtitle]"></ng-content>
    </div>
    @if (menuItems().length > 0) {
      <div class="absolute inset-y-2 inset-e-2">
        <app-ellipsis-menu [menuItems]="menuItems()" />
      </div>
    }
  </div>

  <div class="p-4 pt-0 empty:hidden">
    <ng-content select="[card-content]"></ng-content>
  </div>

  <!-- <ng-template pTemplate="title">
    <div class="flex flex-row items-center">
      <div>
        @if (subtitle()) {
          <div class="txt-body-m font-normal">
            {{ subtitle() }}
          </div>
        }
      </div>
    </div>
  </ng-template> -->

  <!-- <ng-template pTemplate="content">

  </ng-template> -->
  <!-- <ng-template pTemplate="footer">
    <ng-content select="[card-footer]"></ng-content>
  </ng-template> -->
</div>

<ng-template #cardTitle>
  @if (loading()) {
    <app-skeleton-inline />
  } @else {
    <span
      class="line-clamp-2 text-ellipsis"
      [title]="title()"
    >
      {{ title() }}
      @if (!!titleColoredChipLabel()) {
        <app-colored-chip
          [label]="titleColoredChipLabel() ?? ''"
          [variant]="titleColoredChipColor()"
        ></app-colored-chip>
      }
    </span>
  }
</ng-template>
