<button
  type="button"
  class="flex w-full items-center justify-between"
  (click)="toggleExpanded()"
  [attr.aria-expanded]="isExpanded()"
>
  <span class="flex items-center gap-2">
    <span class="font-semibold">{{ label() | translatableString }}:</span>
    <span
      class="rounded-full bg-[#d8efcf] px-2 py-0.5 text-xs font-semibold text-[#3f7a2d]"
      i18n
      >Available</span
    >
  </span>
  <i
    class="pi"
    [ngClass]="isExpanded() ? 'pi-chevron-up' : 'pi-chevron-down'"
  ></i>
</button>

@if (isExpanded()) {
  <div class="mt-3">
    @if (shouldRenderImage()) {
      <img
        [src]="imageUrl()"
        (error)="onImageLoadError()"
        alt="Kobo image"
        i18n-alt="@@kobo-image-alt"
        class="w-full object-cover"
      />
    } @else {
      <a
        [href]="imageUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="text-purple break-all underline"
        >{{ imageUrl() }}</a
      >
    }
  </div>
}
