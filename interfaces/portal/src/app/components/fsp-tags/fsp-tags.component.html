@if (programFsps().length > 0) {
  <ol
    class="flex flex-wrap gap-2"
    data-testid="integrated-fsp-list"
  >
    @for (fsp of programFsps(); track $index) {
      <li>
        <p-tag
          [value]="fsp.defaultLabel | translatableString"
          class="bg-blue-100 text-blue-700"
          [rounded]="true"
        />
      </li>
    }
  </ol>
}
