<p-confirmDialog
  #confirmDialog
  [closeOnEscape]="false"
  [focusTrap]="true"
>
  <ng-template #headless>
    <div class="space-y-6 p-6 inline-[632px]">
      <form
        (ngSubmit)="onProceed()"
        (keydown.control.enter)="onProceed()"
        (keydown.meta.enter)="onProceed()"
      >
        <div class="flex items-center inline-full">
          <h3 [class]="headerClass()">
            <i class="me-2 {{ headerIcon() }}"></i>
            {{ header() }}
          </h3>
          <p-button
            [autofocus]="true"
            ariaLabel="Close"
            i18n-ariaLabel="@@generic-close"
            title="Close"
            i18n-title="@@generic-close"
            icon="pi pi-times"
            class="ms-auto"
            severity="contrast"
            text
            (click)="confirmDialog.onReject()"
          />
        </div>
        <div class="flex grow flex-col gap-2 py-4 inline-full">
          <ng-content></ng-content>
          @if (mutation().isError()) {
            <app-form-error
              [error]="
                mutation().failureReason()?.message?.replaceAll('\\n', '\n')
              "
            />
          }
        </div>
        <div class="mbs-4 flex justify-end gap-4">
          <p-button
            label="Cancel"
            i18n-label="@@generic-cancel"
            outlined
            rounded
            severity="contrast"
            [disabled]="mutation().isPending()"
            (click)="confirmDialog.onReject()"
          />
          <p-button
            [label]="proceedLabel()"
            rounded
            [loading]="mutation().isPending()"
            type="submit"
            [icon]="proceedIcon()"
            data-testid="form-dialog-proceed-button"
          />
        </div>
      </form>
    </div>
  </ng-template>
</p-confirmDialog>
