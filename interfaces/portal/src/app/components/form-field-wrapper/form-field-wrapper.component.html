<div
  [attr.data-testid]="dataTestId()"
  class="mbe-2.5"
>
  <label
    class="block [&_.p-datepicker]:inline-full [&_input]:inline-full [&_textarea]:inline-full"
  >
    <strong class="mbe-2 block">
      <span class="inline-flex items-center gap-1 align-middle max-inline-full">
        @if (isRequired()) {
          <span class="me-0">*</span>
        }
        <span class="ms-0">{{ label() | translatableString }}</span>
        @let tooltip = labelTooltip();
        @if (tooltip) {
          <app-info-tooltip
            [message]="tooltip"
            class="ms-1"
          ></app-info-tooltip>
        }
        <ng-content select="[slot='label-extra']"></ng-content>
      </span>
    </strong>
    <ng-content></ng-content>
    <app-form-error [error]="errorMessage()" />
  </label>
  <ng-content select="[slot='details']"></ng-content>
</div>
