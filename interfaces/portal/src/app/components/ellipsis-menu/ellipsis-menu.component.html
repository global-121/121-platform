<p-button
  text
  plain
  rounded
  size="small"
  [icon]="
    orientation() === 'horizontal'
      ? 'pi pi-ellipsis-h text-lg'
      : 'pi pi-ellipsis-v text-lg'
  "
  title="More actions"
  i18n-title="@@generic-more-actions"
  aria-label="More actions"
  i18n-aria-label="@@generic-more-actions"
  data-testid="ellipsis-menu-button"
  (click)="menu.toggle($event)"
/>
<p-menu
  #menu
  [model]="menuItems()"
  [popup]="true"
  appendTo="body"
/>
