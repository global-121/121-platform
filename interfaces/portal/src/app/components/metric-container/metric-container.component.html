<div class="flex flex-col block-full">
  <dt class="text-grey-700 txt-body-m px-2 pbs-3 pbe-2">
    {{ metric().label }}
  </dt>
  <dd class="border-grey-300 txt-h-2 mbs-auto border-be px-2 pbe-2 font-bold">
    @if (!metric()) {
      <app-skeleton-inline />
    } @else {
      {{ metric().value ?? '-' }}
      @if (metric().showAlert) {
        <i
          class="pi pi-exclamation-triangle text-red-500"
          title="!"
          aria-label="!"
        ></i>
      }
    }
  </dd>
</div>
