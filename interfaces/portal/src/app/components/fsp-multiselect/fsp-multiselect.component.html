<app-form-field-wrapper
  label="Financial service providers:"
  [isRequired]="false"
  [errorMessage]=""
  i18n-label
>
  <p-multiselect
    (ngModelChange)="selectedOptions.set($event); selectionChange.emit($event)"
    [className]="'wrapped-chip-multiselect'"
    [loading]="programId() ? fspConfigurations.isPending() : false"
    [maxSelectedLabels]="100"
    [ngModel]="selectedOptions()"
    [options]="fspMultiselectOptions"
    [showToggleAll]="false"
    [display]="'chip'"
    [filter]="false"
    itemcheckboxicon="false"
    [optionLabel]="'name'"
    [optionValue]="'fspName'"
    placeholder="Select FSPs"
    i18n-placeholder
  >
    <ng-template
      let-fsp
      #item
    >
      <div>{{ fsp.name | translatableString }}</div>
    </ng-template>
  </p-multiselect>
</app-form-field-wrapper>
