<app-form-default
  [formGroup]="formGroup"
  [mutation]="loginMutation"
  submitButtonText="Log in"
  i18n-submitButtonText
>
  <app-form-field-wrapper
    label="E-mail"
    i18n-label
    [errorMessage]="formFieldErrors()('email')"
  >
    <!-- eslint-disable @angular-eslint/template/no-autofocus -- THE login-input allows for an exception. -->
    <input
      pInputText
      type="email"
      formControlName="email"
      autocomplete="username"
      placeholder="yourname@example.org"
      i18n-placeholder
      [pAutoFocus]="true"
      autofocus
    />
    <!-- eslint-enable @angular-eslint/template/no-autofocus -- Only this input requires exception. -->
  </app-form-field-wrapper>
</app-form-default>
