<app-form-default
  [formGroup]="formGroup"
  submitButtonText="Log in"
  i18n-submitButtonText
  [mutation]="loginMutation"
>
  <app-form-field-wrapper
    label="E-mail"
    i18n-label
    [errorMessage]="formFieldErrors()('email')"
  >
    <!-- eslint-disable @angular-eslint/template/no-autofocus -- THE login-input allows for an exception. -->
    <input
      pInputText
      type="email"
      formControlName="email"
      autocomplete="username"
      placeholder="yourname@example.org"
      i18n-placeholder
      [pAutoFocus]="true"
      autofocus
    />
    <!-- eslint-enable @angular-eslint/template/no-autofocus -- Only this input requires exception. -->
  </app-form-field-wrapper>
  <app-form-field-wrapper
    label="Password"
    i18n-label
    [errorMessage]="formFieldErrors()('password')"
  >
    <p-password
      formControlName="password"
      autocomplete="current-password"
      [toggleMask]="true"
      [feedback]="false"
    />
  </app-form-field-wrapper>
</app-form-default>
<p class="mt-4">
  <span i18n>Forgot your password?</span>&nbsp;

  <a
    i18n
    href="mailto:support@121.global?subject=Request Password reset for 121 Platform"
    target="_blank"
    >Request a password reset</a
  >
</p>
