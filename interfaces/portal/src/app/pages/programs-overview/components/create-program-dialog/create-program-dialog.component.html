<app-fullscreen-stepper-dialog
  #createProgramDialog
  [dialogVisible]="currentStep() > 0"
  (dialogVisibleChange)="currentStep.set($event ? 1 : 0)"
  [currentStep]="currentStep()"
  [proceedLabel]="proceedLabel()"
  [cannotProceed]="createProgramMutation.isPending()"
  [queryParamStep]="'create-program-step'"
  (goBack)="goBack()"
  (proceed)="goToNextStep()"
>
  <ng-template #header>
    @if (isDuplicate()) {
      <i class="pi pi-clone me-2"></i>
      <ng-container i18n>Duplicate program</ng-container>
    } @else {
      <i class="pi pi-plus me-2"></i>
      <ng-container i18n>Create new program</ng-container>
    }
  </ng-template>
  <ng-template #step>
    <p-card>
      <h2
        i18n
        class="mbe-2"
      >
        Program name
      </h2>
      <p
        i18n
        class="mbe-4"
      >
        Add a name and description to your program to help your users find it.
      </p>
      <app-program-form-name
        #formName
        [program]="duplicateSource()"
      />
    </p-card>
  </ng-template>
  <ng-template #step>
    <p-card>
      <h2
        i18n
        class="mbe-2"
      >
        Program information
      </h2>

      <p
        i18n
        class="mbe-4"
      >
        Add general information to define your program details.
      </p>
      <app-program-form-information
        #formInformation
        [program]="duplicateSource()"
      />
    </p-card>
  </ng-template>
  <ng-template #step>
    <p-card>
      <h2
        i18n
        class="mbe-4"
      >
        Finance
      </h2>
      <app-program-form-budget
        #formBudget
        [program]="duplicateSource()"
      />
    </p-card>
  </ng-template>
  <ng-template #illustration>
    <img
      ngSrc="assets/create-program.svg"
      height="439"
      width="524"
      alt=""
      aria-hidden="true"
      role="presentation"
      class="mx-auto"
    />
  </ng-template>
</app-fullscreen-stepper-dialog>
