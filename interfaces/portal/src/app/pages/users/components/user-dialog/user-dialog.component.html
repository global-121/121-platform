<app-form-dialog
  #formDialog
  [formGroup]="formGroup"
  [mutation]="userMutation"
  [mutationData]="formGroup.getRawValue()"
  [header]="dialogTranslations().header"
  [headerIcon]="dialogTranslations().headerIcon"
  [proceedLabel]="dialogTranslations().proceedLabel"
>
  @if (!isEditing()) {
    <p class="mb-4">
      <ng-container i18n>
        Add a user to the 121 platform. Fill in the fields below to create a new
        user account.
      </ng-container>
      <ng-container i18n="@@generic-more-info-in-manual">
        For more information see the <app-manual-link />.
      </ng-container>
    </p>
  }

  <app-form-field-wrapper
    label="Full name"
    i18n-label
    [errorMessage]="formFieldErrors()('displayNameValue')"
  >
    <input
      pInputText
      type="text"
      formControlName="displayNameValue"
      autocomplete="off"
      placeholder="Firstname Lastname"
      i18n-placeholder
    />
  </app-form-field-wrapper>
  <app-form-field-wrapper
    label="E-mail"
    i18n-label
    [errorMessage]="formFieldErrors()('usernameValue')"
  >
    <input
      pInputText
      type="email"
      formControlName="usernameValue"
      autocomplete="off"
      placeholder="username@example.org"
      i18n-placeholder
    />
  </app-form-field-wrapper>
</app-form-dialog>
