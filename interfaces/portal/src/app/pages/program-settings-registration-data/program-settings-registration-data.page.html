<app-page-layout-program-settings [programId]="programId()">
  <p-card class="mbe-4">
    <div class="mbe-2 flex items-center gap-x-2 min-block-7.5">
      <h2 i18n="@@page-title-program-settings-registration-integration">
        Registration integration
      </h2>
    </div>
    <div class="mbe-6">
      <p i18n>
        Select a registration tool you want to integrate to the program.
      </p>
      <p i18n>
        For more information about how to link a registration tool see
        <app-manual-link />
      </p>
    </div>

    <app-kobo-integration-card
      [programId]="programId()"
      class="inline-1/2"
    ></app-kobo-integration-card>

    @if (!koboIntegration.isPending()) {
      <app-required-attributes
        [programId]="programId()"
        [isKoboIntegrated]="isKoboIntegrated()"
      ></app-required-attributes>
    }
  </p-card>

  @if (isKoboIntegrated()) {
    <app-registration-questions-card
      [programId]="programId()"
    ></app-registration-questions-card>
  }
</app-page-layout-program-settings>
