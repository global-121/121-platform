<app-card-with-link
  [image]="'assets/registration-data/kobo-toolbox.svg'"
  [titleColoredChipLabel]="titleColoredChipLabel()"
  [menuItems]="isKoboIntegrated() ? writableMenuItems() : []"
  [attr.data-testid]="'kobo-integration-card'"
  [enableLink]="!isKoboIntegrated()"
  [titleColoredChipColor]="'green'"
  title="KoboToolbox"
  i18n-title
  (cardClicked)="handleCardClicked()"
>
  <ng-container card-subtitle>
    @if (isKoboIntegrated()) {
      <div class="flex items-end justify-between">
        @if (externalFormUrl(); as formUrl) {
          <a
            [href]="formUrl"
            rel="'external'"
            target="_blank"
            title="Opens in a new window"
            i18n-title="@@generic-opens-in-new-window"
          >
            <span class="underline">{{
              koboIntegration.data()?.name ?? formUrl
            }}</span>
            <span
              aria-hidden="true"
              class="p-button-icon pi pi-external-link relative inset-bs-0.25 ms-1.5 text-xs"
            ></span>
          </a>
        }
        <p
          i18n
          class="text-grey-700 text-end text-sm"
        >
          Last updated:
          <time
            data-testid="kobo-integration-last-updated"
            [attr.datetime]="koboIntegration.data()?.updated | date: 'short'"
            >{{ koboIntegration.data()?.updated | date: 'short' }}</time
          >
        </p>
      </div>
    }

    @if (!isKoboIntegrated()) {
      <p i18n>Click to link</p>
    }
  </ng-container>
</app-card-with-link>

<!-- DIALOGS -->

<app-kobo-configuration-dialog
  #koboConfigurationDialog
  [programId]="programId()"
/>

<app-kobo-import-existing-registration-dialog
  #koboImportExistingDialog
  [programId]="programId()"
/>

<app-kobo-error-dialog
  #koboErrorDialog
  [errors]="koboRefreshErrors()"
  [isKoboIntegrated]="isKoboIntegrated()"
/>
