<app-card-with-link
  [image]="'assets/registration-data/kobo-toolbox.svg'"
  [titleColoredChipLabel]="titleColoredChipLabel()"
  [menuItems]="isKoboIntegrated() ? menuItems() : []"
  [attr.data-testid]="'kobo-integration-card'"
  [enableLink]="!isKoboIntegrated()"
  [titleColoredChipColor]="'green'"
  title="KoboToolbox"
  i18n-title
  (cardClicked)="
    isKoboIntegrated() ? undefined : koboConfigurationDialog.show()
  "
>
  <ng-container
    i18n
    card-content
  >
    @if (isKoboIntegrated()) {
      adsdas
    }
  </ng-container>

  <ng-container
    i18n
    card-subtitle
  >
    {{ isKoboIntegrated() ? 'KoboToolbox is integrated' : 'Not integrated' }}
  </ng-container>

  <ng-container card-footer>
    @if (isKoboIntegrated()) {
      <p
        i18n
        class="text-end"
      >
        Last updated:
        <span>{{ koboIntegration.data()?.dateDeployed | date }}</span>
      </p>
    }
  </ng-container>
</app-card-with-link>

<app-kobo-configuration-dialog
  #koboConfigurationDialog
  [programId]="programId()"
/>

<app-kobo-import-existing-registration-dialog
  #koboImportExistingDialog
  [programId]="programId()"
/>
