<p-accordion
  [value]="accordionValue()"
  class="p-accordion-padding-reset"
>
  <p-accordion-panel
    value="integrated-fsps-accordion-panel"
    class="pbs-4"
  >
    <p-accordion-header>
      <div>
        <div class="mbs-4">
          <h2
            i18n
            class="mbe-2 text-base!"
          >
            Integrated FSPs
          </h2>

          <app-fsp-tags [programId]="programId()" />
        </div>
      </div>
    </p-accordion-header>
    <p-accordion-content class="mbs-4">
      <p i18n>
        Your form must include the following required fields, using these
        <strong class="font-display">exact data column names</strong> (these
        would be the column headers in Excel).
      </p>

      <p-table
        [value]="requiredAttributes()"
        data-testid="required-attributes-table"
        class="mbs-4"
      >
        <ng-template #header>
          <tr>
            <th
              i18n
              class="txt-body-s text-grey-700 px-2 py-1.5 font-semibold uppercase"
            >
              Field
            </th>
            <th
              i18n
              class="txt-body-s text-grey-700 px-2 py-1.5 font-semibold uppercase"
            >
              Data column name
            </th>
          </tr>
        </ng-template>
        <ng-template
          #body
          let-attribute
        >
          <tr>
            <td class="px-2">
              {{ attribute.label }}
              @if (attribute.infoTooltip) {
                <app-info-tooltip [message]="attribute.infoTooltip()" />
              }
            </td>
            <td class="px-2">
              {{ attribute.name }}

              <p-button
                (click)="copyToClipboard(attribute.name)"
                i18n-ariaLabel="@@generic-copy-to-clipboard"
                ariaLabel="Copy to clipboard"
                title="Copy to clipboard"
                i18n-title="@@generic-copy-to-clipboard"
                icon="pi pi-copy"
                class="hover:text-purple hover:cursor-pointer"
                [unstyled]="true"
                size="small"
              />
            </td>
          </tr>
        </ng-template>
      </p-table>
    </p-accordion-content>
  </p-accordion-panel>
</p-accordion>
