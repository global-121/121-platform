<app-card-editable
  header="Personal information"
  i18n-header
  editPencilTitle="Edit personal information"
  i18n-editPencilTitle
  [canEdit]="false"
  [isEditing]="false"
  [formGroup]="formGroup"
  [mutation]="undefined"
  [mutationData]="formGroup.getRawValue()"
>
  <p
    i18n
    class="mb-4"
  >
    Below are the {{ programAttributes.data()?.length }} questions from the
    integrated Kobo form. Please edit each column name to a shorter version that
    will be displayed in the data table and on the profile page.
  </p>

  <app-program-language-tabs
    [programId]="programId()"
    [(currentLanguage)]="currentLanguage"
  >
    <ng-template #languageTemplate>
      <p-table [value]="sortedAttributes()">
        <ng-template #header>
          <tr>
            <th
              i18n
              class="w-1/2"
            >
              Data column name
            </th>
            <th
              i18n
              class="w-1/2"
            >
              Question label
            </th>
          </tr>
        </ng-template>
        <ng-template
          #body
          let-attribute
        >
          <tr [formGroupName]="attribute.name">
            <td>{{ attribute.name }}</td>
            <td>{{ labelToShow(attribute)() }}</td>
          </tr>
        </ng-template>
      </p-table>
    </ng-template>
  </app-program-language-tabs>
</app-card-editable>
