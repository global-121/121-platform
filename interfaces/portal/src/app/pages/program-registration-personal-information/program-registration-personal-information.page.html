<app-page-layout-registration
  [programId]="programId()"
  [registrationId]="registrationId()"
>
  <div class="px-2">
    @if (!registrationAttributes.isSuccess()) {
      <p-skeleton height="24rem" />
    } @else {
      @if (!isEditing()) {
        @if (canUpdatePersonalInformation()) {
          <div class="text-end">
            <p-button
              label="Edit information"
              i18n-label
              (click)="isEditing.set(true)"
              icon="pi pi-pencil"
              [iconPos]="rtlHelper.createPosition('start')()"
              outlined
              rounded
            />
          </div>
        }
        @if (hasKoboImages()) {
          <div class="grid gap-4 lg:grid-cols-2">
            <app-data-list
              [data]="textDataList()"
              [forceOneColumn]="true"
            />
            <app-data-list
              [data]="imageDataList()"
              [forceOneColumn]="true"
            />
          </div>
        } @else {
          <app-data-list [data]="dataList()" />
        }
      } @else {
        <app-edit-personal-information
          #editPersonalInformation
          [programId]="programId()"
          [registrationId]="registrationId()"
          [attributeList]="registrationAttributes.data()"
          (cancelEditing)="isEditing.set(false)"
          (registrationUpdated)="onRegistrationUpdated()"
        />
      }
    }
  </div>
</app-page-layout-registration>
