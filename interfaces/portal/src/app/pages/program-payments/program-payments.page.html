<app-page-layout
  pageTitle="Payments"
  i18n-pageTitle="@@page-title-program-payments"
  [programId]="programId()"
>
  <div
    header-actions
    class="flex gap-x-2"
  >
    @if (canExport()) {
      <app-export-payments [programId]="programId()" />
    }
    @if (canCreatePayment()) {
      <app-create-payment [programId]="programId()" />
    }
  </div>

  @if (paymentStatus.data()?.inProgress) {
    <!-- @TODO: REFACTOR THIS - Name is incorrect, could also be nested, or at bottom of page. Change to `app-message` -->
    <app-top-page-banner
      color="orange"
      data-testid="payment-in-progress-banner"
    >
      <span class="pi pi-spinner me-2 animate-spin self-center text-xl"></span>
      <strong
        class="me-1"
        i18n
        >Payment in progress</strong
      >
      <strong class="me-1">-</strong>
      <span
        i18n
        class="text-black"
        >please wait before creating a new payment.</span
      >
    </app-top-page-banner>
  }

  @if (paymentsSorted()?.length === 0) {
    <app-info-card
      subtitle="There are no payments for this program yet."
      i18n-subtitle
      title="No Payments found"
      i18n-title
    />
  } @else {
    <app-card-grid [loading]="payments.isPending()">
      @for (payment of paymentsSorted(); track $index) {
        <li>
          <app-payment-summary-card
            [programId]="programId()"
            [paymentId]="payment.paymentId"
            [paymentDate]="payment.paymentDate"
            [cardIndex]="$index"
            [paymentData]="payment"
          ></app-payment-summary-card>
        </li>
      }
    </app-card-grid>
  }
</app-page-layout>
