<app-page-layout
  pageTitle="Payments"
  i18n-pageTitle="@@page-title-program-payments"
  [programId]="programId()"
>
  <div
    header-actions
    class="flex gap-x-2"
  >
    @if (canExport()) {
      <app-export-payments [programId]="programId()" />
    }
    @if (canCreatePayment()) {
      <app-create-payment [programId]="programId()" />
    }
  </div>

  @if (paymentStatus.data()?.inProgress) {
    <app-notification-banner
      [color]="'orange'"
      data-testid="payment-in-progress-banner"
      [content]="{
        title: 'Payment in progress',
        description: 'Please wait before creating a new payment.',
        icon: 'info',
      }"
    />
  }

  <app-card-grid
    [empty]="paymentsSorted()?.length === 0"
    emptyTitle="No Payments found"
    i18n-emptyTitle
    emptySubtitle="There are no payments for this program yet."
    i18n-emptySubtitle
    [loading]="payments.isPending()"
  >
    @for (payment of paymentsSorted(); track $index) {
      <li>
        <app-payment-summary-card
          [programId]="programId()"
          [paymentId]="payment.paymentId"
          [paymentDate]="payment.paymentDate"
          [cardIndex]="$index"
          [paymentData]="payment"
        ></app-payment-summary-card>
      </li>
    }
  </app-card-grid>
</app-page-layout>
