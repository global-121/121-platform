<div class="flex min-h-screen flex-col">
  <app-header [projectId]="projectId()" />
  <div class="flex flex-1 flex-col">
    @if (pageLoadError()) {
      <div class="flex-1 px-6 py-8 lg:px-24">
        <p-message
          severity="warn"
          styleClass="w-full"
          [text]="pageLoadError()"
        />
      </div>
    } @else {
      @if (projectId()) {
        <app-project-menu [projectId]="projectId()!" />
      }
      <div class="flex-1 px-6 py-8 lg:px-24">
        @if (registrationId()) {
          <app-registration-header
            [projectId]="projectId()!"
            [registrationId]="registrationId()!"
          />
          <p-card styleClass="mt-6">
            <app-registration-menu
              [projectId]="projectId()!"
              [registrationId]="registrationId()!"
            />
            <ng-content select="[registration-page]"></ng-content>
          </p-card>
        } @else {
          @if (pageTitle()) {
            @let parentTitle = parentPageTitle();
            @let parentLink = parentPageLink();

            <app-page-layout-title-and-actions>
              <ng-container page-layout-title>
                @if (parentTitle && parentLink) {
                  <app-breadcrumbs-title
                    [parentLink]="parentLink"
                    [parentTitle]="parentTitle"
                    [childTitle]="pageTitle()"
                  ></app-breadcrumbs-title>
                } @else {
                  {{ pageTitle() }}
                }
              </ng-container>
              <ng-container page-layout-actions>
                <ng-content select="[header-actions]"></ng-content>
              </ng-container>
            </app-page-layout-title-and-actions>
          }

          <ng-content></ng-content>
        }
      </div>
    }
    <app-footer />
  </div>
</div>
