# The settings from this file will override the values from `docker-compose.yml`
# When run via:
#     docker compose -f docker-compose.yml -f docker-compose.development.yml

# For use on macOS:
# See: https://www.docker.com/blog/user-guided-caching-in-docker-for-mac/
# To speed up the start-up process, use: ':cached' flag on volume definitions

# For debugging:
#
# Make the service boot and wait:
#     command: "tail -f /dev/null"
#

services:
  mock-service:
    build:
      target: development
    ports:
      - '${PORT_MOCK_SERVICE}:${PORT_MOCK_SERVICE}'
      - '9230:9230'
    volumes:
      - '../packages:/home/packages'
      - './mock-service:/home/node/app'
      - node_modules_mock-service:/home/node/app/node_modules
    restart: unless-stopped

  121-service:
    build:
      target: development
    ports:
      - '${PORT_121_SERVICE}:${PORT_121_SERVICE}'
      - '9229:9229'
      - '9231:9231'
    volumes:
      - '../packages:/home/packages'
      - './121-service:/home/node/app'
      - node_modules_121-service:/home/node/app/node_modules
    command: 'npm run start:dev${COVERAGE_DEV_STARTUP_SUFFIX}'
    restart: unless-stopped

volumes:
  node_modules_121-service:
  node_modules_mock-service:
