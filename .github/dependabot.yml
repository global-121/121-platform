# See: https://docs.github.com/en/github/administering-a-repository/configuration-options-for-dependency-updates#configuration-options-for-dependabotyml
version: 2

updates:
  - directory: '/'
    commit-message:
      prefix: '[github-actions] '
    package-ecosystem: github-actions
    schedule:
      interval: monthly
      day: tuesday
    cooldown:
      default-days: 8

  - directory: '/'
    commit-message:
      prefix: '[root] '
    package-ecosystem: npm
    schedule:
      interval: monthly
      day: tuesday
    cooldown:
      default-days: 8 # See: .npmrc
    open-pull-requests-limit: 5
    versioning-strategy: increase

  - directory: '/packages/eslint-config-121-platform/'
    commit-message:
      prefix: '[eslint-config] '
    package-ecosystem: npm
    schedule:
      interval: monthly
      day: tuesday
    cooldown:
      default-days: 8 # See: .npmrc
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      dependencies:
        patterns:
          - '*'
    ignore:
      # Dependencies below are ordered alphabetically!
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - directory: '/services/121-service'
    commit-message:
      prefix: '[121-service] '
    package-ecosystem: npm
    schedule:
      interval: monthly
      day: tuesday
    cooldown:
      default-days: 8 # See: .npmrc
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      development:
        patterns:
          - '@swc/*'
          - '@types/*'
          - '*eslint*'
          - '*prettier*'
      nestjs:
        patterns: ['@nestjs/*']
    ignore:
      # Dependencies below are ordered alphabetically!
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: 'applicationinsights'
        update-types: ['version-update:semver-major']
      - dependency-name: 'bwip-js'
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'jimp'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - directory: '/services/mock-service'
    commit-message:
      prefix: '[mock-service] '
    package-ecosystem: npm
    schedule:
      interval: monthly
      day: tuesday
    cooldown:
      default-days: 8 # See: .npmrc
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      development:
        patterns:
          - '@swc/*'
          - '@types/*'
          - '*eslint*'
          - '*prettier*'
      nestjs:
        patterns: ['@nestjs/*']
    ignore:
      # Dependencies below are ordered alphabetically!
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - directory: '/interfaces/portal'
    commit-message:
      prefix: '[portal] '
    package-ecosystem: npm
    schedule:
      interval: monthly
      day: tuesday
    cooldown:
      default-days: 8 # See: .npmrc
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      angular:
        patterns:
          - '@angular*'
          - 'primeng'
          - 'typescript'
          - 'zone.js'
          - '*eslint*'
          - '*prettier*'
      AzureMSAL:
        patterns:
          - '@azure/msal*' # Combine peer-dependencies
      dependencies:
        patterns:
          - '*'
        exclude-patterns: # Make sure to exclude all of the groups defined above
          - '@angular*'
          - 'primeng'
          - 'typescript'
          - 'zone.js'
          - '@azure/msal*'
          - '*eslint*'
          - '*prettier*'
    ignore:
      # Dependencies below are ordered alphabetically!
      - dependency-name: '@angular*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint-plugin-better-tailwindcss'
        update-types: ['version-update:semver-major']
      - dependency-name: 'filesize'
        update-types: ['version-update:semver-major'] # See: https://www.npmjs.com/package/ngx-filesize
      - dependency-name: 'primeng'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - directory: '/e2e'
    commit-message:
      prefix: '[e2e] '
    package-ecosystem: npm
    schedule:
      interval: monthly
      day: tuesday
    cooldown:
      default-days: 8 # See: .npmrc
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      dependencies:
        patterns:
          - '*'
    ignore:
      # Dependencies below are ordered alphabetically!
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
